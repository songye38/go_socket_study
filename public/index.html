<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Go 실시간 채팅 맛보기</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; }
        #chat-box { height: 300px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>Go 웹소켓 기초 맛보기 (1단계)</h2>
    <div id="chat-box"></div>
    <input type="text" id="msg-input" placeholder="메시지를 입력하세요..." onkeydown="if(event.keyCode==13) send()">
    <button onclick="send()">전송</button>

    <script>
        // Go 서버의 웹소켓 엔드포인트와 연결
        const ws = new WebSocket("ws://localhost:8080/ws");
        const chatBox = document.getElementById("chat-box");
        const msgInput = document.getElementById("msg-input");

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const msgElement = document.createElement("div");
            msgElement.textContent = data.text;
            chatBox.appendChild(msgElement);
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        function send() {
            if (!msgInput.value.trim()) return;
            // Go 서버가 받을 수 있게 JSON 구조로 보냅니다.
            const message = { text: msgInput.value };
            ws.send(JSON.stringify(message));
            msgInput.value = "";
        }
    </script>
</body>
</html>
